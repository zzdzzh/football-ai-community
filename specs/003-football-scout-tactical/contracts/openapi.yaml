openapi: 3.0.3
info:
  title: 足球社区 Scout & Tactical API
  description: |
    MVP-3 REST API 契约（球员数据、Scout 推荐对话、Tactical 战术分析、球员同步 Job）。
    认证：JWT Bearer Token（对话、反馈、球员查询）。
    共享 schema（User、ErrorResponse、Team、Match 基础）与 [001-football-feed-mvp](../001-football-feed-mvp/contracts/openapi.yaml)、[002-football-stats-content](../002-football-stats-content/contracts/openapi.yaml) 保持一致；本文件定义 MVP-3 增量端点与 Conversation/Message 扩展。
  version: 1.0.0-mvp3
  contact:
    name: Football AI Community

servers:
  - url: http://localhost:3000/api
    description: 本地开发

tags:
  - name: Players
  - name: ScoutConversations
  - name: TacticalConversations
  - name: Internal

paths:
  /players:
    get:
      tags: [Players]
      summary: 查询球员列表
      description: 按联赛、球队、位置筛选；数据来自本地 SQLite 缓存
      operationId: listPlayers
      security:
        - bearerAuth: []
      parameters:
        - name: league
          in: query
          schema:
            type: string
            enum: [PL, PD, BL1, SA, FL1, CL, WC]
        - name: teamId
          in: query
          schema:
            type: string
        - name: position
          in: query
          description: 位置模糊匹配
          schema:
            type: string
        - name: q
          in: query
          description: 姓名模糊搜索
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: 球员列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /players/{playerId}:
    get:
      tags: [Players]
      summary: 获取球员详情
      operationId: getPlayer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/playerId'
      responses:
        '200':
          description: 球员详情含统计快照
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /conversations:
    get:
      tags: [ScoutConversations, TacticalConversations]
      summary: 获取当前用户的 Scout/Tactical 对话列表
      operationId: listScoutTacticalConversations
      security:
        - bearerAuth: []
      parameters:
        - name: agentId
          in: query
          required: true
          schema:
            type: string
            enum: [scout, tactical]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: 对话列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoutTacticalConversationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [ScoutConversations, TacticalConversations]
      summary: 创建 Scout 或 Tactical 对话
      operationId: createScoutTacticalConversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScoutTacticalConversationRequest'
      responses:
        '201':
          description: 对话已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoutTacticalConversationDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 上下文（比赛/球队/联赛）未找到
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /conversations/{conversationId}:
    get:
      tags: [ScoutConversations, TacticalConversations]
      summary: 获取 Scout/Tactical 对话详情
      operationId: getScoutTacticalConversation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/conversationId'
      responses:
        '200':
          description: 对话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoutTacticalConversationDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 非本人对话
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /conversations/{conversationId}/messages:
    post:
      tags: [ScoutConversations, TacticalConversations]
      summary: 向 Scout 或 Tactical Agent 发送消息
      description: |
        Scout：30 秒内返回 ≥3 名球员推荐（宽泛条件时 top5 + narrowHint）。
        Tactical：返回含阵型与战术阶段的结构化分析；区分赛后复盘与赛前预判。
      operationId: sendScoutTacticalMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/conversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: 用户消息与 assistant 回复
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoutTacticalSendMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 非本人对话
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '408':
          description: Agent 响应超时
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 球员数据同步中或外部服务不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /conversations/{conversationId}/messages/{messageId}/feedback:
    post:
      tags: [ScoutConversations]
      summary: 对 Scout/Tactical assistant 消息提交反馈
      description: 用于 SC-004 满意率统计
      operationId: submitMessageFeedback
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/conversationId'
        - $ref: '#/components/parameters/messageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageFeedbackRequest'
      responses:
        '200':
          description: 反馈已记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageFeedbackResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 非本人对话或消息不可反馈
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/jobs/player-sync:
    post:
      tags: [Internal]
      summary: 手动触发球员名单与射手榜同步
      operationId: triggerPlayerSync
      parameters:
        - name: X-Internal-Key
          in: header
          required: true
          schema:
            type: string
        - name: league
          in: query
          description: 可选，限定单联赛
          schema:
            type: string
            enum: [PL, PD, BL1, SA, FL1, CL, WC]
      responses:
        '202':
          description: 同步任务已接受
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
        '401':
          description: Internal Key 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    playerId:
      name: playerId
      in: path
      required: true
      schema:
        type: string
    conversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    messageId:
      name: messageId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: 请求参数无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未认证
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: 数据同步中或服务暂不可用
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        traceId:
          type: string

    JobAcceptedResponse:
      type: object
      required: [jobId, status]
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [accepted]

    PlayerStat:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
        value:
          oneOf:
            - type: number
            - type: string
        unit:
          type: string

    Player:
      type: object
      required: [id, name, teamId, teamName, leagueCode]
      properties:
        id:
          type: string
        name:
          type: string
        teamId:
          type: string
        teamName:
          type: string
        position:
          type: string
        age:
          type: integer
          nullable: true
        nationality:
          type: string
        leagueCode:
          type: string
          enum: [PL, PD, BL1, SA, FL1, CL, WC]

    PlayerDetail:
      allOf:
        - $ref: '#/components/schemas/Player'
        - type: object
          properties:
            dateOfBirth:
              type: string
              format: date
              nullable: true
            stats:
              type: array
              items:
                $ref: '#/components/schemas/PlayerStat'
            syncMessage:
              type: string
              description: 数据未就绪时的提示

    PlayerListResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Player'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        syncStatus:
          type: string
          enum: [ok, degraded, down]

    PlayerRecommendation:
      type: object
      required: [playerId, playerName, teamName, matchReason, keyStats]
      properties:
        playerId:
          type: string
        playerName:
          type: string
        teamName:
          type: string
        position:
          type: string
        matchReason:
          type: string
        keyStats:
          type: array
          minItems: 3
          items:
            $ref: '#/components/schemas/PlayerStat'

    TacticalPhase:
      type: object
      required: [key, label, summary]
      properties:
        key:
          type: string
          enum: [build_up, pressing, transition, set_piece]
        label:
          type: string
        summary:
          type: string
        keyPlayerNames:
          type: array
          items:
            type: string

    TacticalAnalysis:
      type: object
      required: [analysisType, formation, phases]
      properties:
        analysisType:
          type: string
          enum: [post_match, pre_match_prediction]
        formation:
          type: string
        phases:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TacticalPhase'
        keyPlayers:
          type: array
          items:
            type: object
            required: [name, role]
            properties:
              name:
                type: string
              role:
                type: string
        dataLimitations:
          type: array
          items:
            type: string

    ScoutTacticalConversationSummary:
      type: object
      required: [id, agentId, title, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        agentId:
          type: string
          enum: [scout, tactical]
        contextType:
          type: string
          enum: [general, league, team, match]
        contextId:
          type: string
          nullable: true
        title:
          type: string
        updatedAt:
          type: string
          format: date-time

    ScoutTacticalMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/PlayerRecommendation'
          description: Scout assistant 消息专用
        tacticalAnalysis:
          $ref: '#/components/schemas/TacticalAnalysis'
          description: Tactical assistant 消息专用
        confidence:
          type: string
          enum: [high, medium, low]
        missingFields:
          type: array
          items:
            type: string
        narrowHint:
          type: string
          description: 条件过宽时提示用户补充筛选
        createdAt:
          type: string
          format: date-time

    ScoutTacticalConversationDetail:
      allOf:
        - $ref: '#/components/schemas/ScoutTacticalConversationSummary'
        - type: object
          required: [messages]
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/ScoutTacticalMessage'

    ScoutTacticalConversationListResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScoutTacticalConversationSummary'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    CreateScoutTacticalConversationRequest:
      type: object
      required: [agentId, contextType]
      properties:
        agentId:
          type: string
          enum: [scout, tactical]
        contextType:
          type: string
          description: |
            Scout: general | league | team
            Tactical: match | team
          enum: [general, league, team, match]
        contextId:
          type: string
          description: league 时为联赛代码；team/match 时为 ID；general 可省略
        initialMessage:
          type: string
          description: 可选，创建后立即发送首条问题

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 2000

    ScoutTacticalSendMessageResponse:
      type: object
      required: [userMessage, assistantMessage]
      properties:
        userMessage:
          $ref: '#/components/schemas/ScoutTacticalMessage'
        assistantMessage:
          $ref: '#/components/schemas/ScoutTacticalMessage'

    MessageFeedbackRequest:
      type: object
      required: [helpful]
      properties:
        helpful:
          type: boolean

    MessageFeedbackResponse:
      type: object
      required: [messageId, helpful, recordedAt]
      properties:
        messageId:
          type: string
          format: uuid
        helpful:
          type: boolean
        recordedAt:
          type: string
          format: date-time
